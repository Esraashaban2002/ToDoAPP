<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List </title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <section class="container">
        <span id="toggle-mode">🌛</span>
        <h1>To-Do App</h1>

        <form class="row g-3" id="task-form">
            <div class="col-8">
                <input type="text" class="form-control" id="task-input" placeholder="Add a new task" required>
            </div>
            <div class="col-4">
                <button type="submit" id="addBtn" class="btn btn-primary mb-3">Add Task</button>
            </div>
        </form>
        <!-- Controls -->

        <div class="controls">
            <input type="text" id="search" placeholder="Search task..." class="me-5 mb-3">
            <button id="clear-completed" class="btn btn-primary mb-3">Clear Completed</button>
            <div class="filters text-center">
                <button data-filter="all" class="btn btn-primary mb-3">All</button>
                <button data-filter="active" class="btn btn-primary mb-3">Active</button>
                <button data-filter="completed" class="btn btn-primary mb-3">Completed</button>   
            </div>

            
            <div class="counter">
                <span id="total"></span>
                <span id="completed"></span>
                <span id="remaining"></span>
            </div>


        </div>

        <ul id="task-list"></ul>

    </section>

    <script src="js/script.js"></script>
</body>

</html>
